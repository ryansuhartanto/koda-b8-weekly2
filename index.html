<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Document</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
    rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<!-- RESTRICTION ⚠️ Only `block` and `table` -->

<body>
  <header>
    <section aria-label="Utility bar">
      <div class="inset">
        <table>
          <tbody>
            <tr>
              <td class="location">
                <span class="material-symbols-outlined">
                  location_on
                </span>
                Kirim ke: Jakarta Selatan
              </td>
              <td class="contact">
                <span>📞 0800-1234-5678 (Gratis)</span>
                <span class="space"></span>
                <span>🚀 Gratis ongkir di atas Rp 100.000</span>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

    <section aria-label="Main header">
      <div class="inset">
        <a class="brand" href="index.html">
          <table>
            <tbody>
              <tr>
                <td class="logo">B</td>
                <td class="gap"></td>
                <td>BeliMudah</td>
              </tr>
            </tbody>
          </table>
        </a>

        <span class="gap"></span>

        <form>
          <table>
            <tbody>
              <tr>
                <td class="input">
                  <input type="text" name="q" autocomplete="off" placeholder="Cari produk, merek, kategori...">
                </td>
                <td class="submit">
                  <button type="submit">
                    <span class="material-symbols-outlined">
                      search
                    </span>
                  </button>
                </td>
              </tr>
            </tbody>
          </table>
        </form>

        <span class="gap"></span>

        <div class="links">
          <table>
            <tbody>
              <tr>
                <td>
                  <a href="">
                    <span class="material-symbols-outlined">
                      notifications
                    </span>
                  </a>
                </td>
                <td>
                  <a href="">
                    <span class="material-symbols-outlined">
                      person
                    </span>
                    <span class="user">Budi</span>
                  </a>
                </td>
                <td>
                  <a href="">
                    <span class="material-symbols-outlined">
                      favorite
                    </span>
                  </a>
                </td>
                <td>
                  <a href="">
                    <span class="material-symbols-outlined">
                      shopping_cart
                    </span>
                  </a>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>

    <hr>

    <nav>
      <div class="inset">
        Navigation
      </div>
    </nav>
  </header>

  <main>

  </main>

  <footer>

  </footer>
</body>

</html>
