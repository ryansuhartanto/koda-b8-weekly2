<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Document</title>

  <link rel="preconnect" href="https://rsms.me/">
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" crossorigin>

  <link rel="preconnect" href="https://unpkg.com/">
  <link rel="stylesheet" href="https://unpkg.com/lucide-static@latest/font/lucide.css" crossorigin>

  <link rel="stylesheet" href="style.css">
</head>

<!-- RESTRICTION ⚠️ Only `block` and `table` -->

<body>
  <header>
    <section aria-label="Utility bar">
      <div class="inset">
        <table>
          <tbody>
            <tr>
              <td class="location">
                <i class="icon-map-pin"></i>
                Kirim ke: Jakarta Selatan
              </td>
              <td class="space"></td>
              <td class="contact">
                <span>📞 0800-1234-5678 (Gratis)</span>
                <span class="gap"></span>
                <span>🚀 Gratis ongkir di atas Rp 100.000</span>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

    <section aria-label="Main header">
      <div class="inset">
        <a class="brand" href="index.html">
          <table>
            <tbody>
              <tr>
                <td class="logo">B</td>
                <td class="gap"></td>
                <td>BeliMudah</td>
              </tr>
            </tbody>
          </table>
        </a>

        <span class="gap"></span>

        <form>
          <table>
            <tbody>
              <tr>
                <td class="input">
                  <input type="text" name="q" autocomplete="off" placeholder="Cari produk, merek, kategori...">
                </td>
                <td class="submit">
                  <button type="submit" aria-label="Search">
                    <i class="icon-search"></i>
                  </button>
                </td>
              </tr>
            </tbody>
          </table>
        </form>

        <span class="gap"></span>

        <div class="links">
          <table>
            <tbody>
              <tr>
                <td>
                  <a aria-label="Notifications" href="">
                    <i class="icon-bell"></i>
                  </a>
                </td>
                <td>
                  <a aria-label="User" href="">
                    <i class="icon-user"></i>
                    <span class="gap"></span>
                    <span class="user">Budi</span>
                  </a>
                </td>
                <td>
                  <a aria-label="Favorite" href="">
                    <i class="icon-heart"></i>
                  </a>
                </td>
                <td>
                  <a aria-label="Cart " href="">
                    <i class="icon-shopping-cart"></i>
                  </a>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>

    <hr>

    <nav aria-label="Main navigations">
      <div class="inset">
        <a class="all" href="">
          <i class="icon-menu"></i>
          Semua Kategori
          <i class="icon-chevron-down"></i>
        </a>
        <a href="">💻 Electronic</a>
        <a href="">👗 Fashion</a>
        <a href="">🏠 Rumah &amp; Dapur</a>
        <a href="">💄 Kecantikan</a>
        <a href="">⚽ Olahraga</a>
        <a href="">📚 Buku &amp; Alat Tulis</a>
        <a class="hot" href="">🔥 Promo</a>
      </div>
    </nav>
  </header>

  <main style="height: 100dvh; background-color: var(--color-blue);">

  </main>

  <footer>
    <section aria-label="Promotions">
      <div class="inset">
        Promotions
      </div>
    </section>

    <hr>

    <nav aria-label="Main footer">
      <div class="inset">
        Footer
      </div>
    </nav>

    <hr>

    <section aria-label="Copyright">
      <div class="inset">
        <small>
          Copyright
        </small>
      </div>
    </section>
  </footer>
</body>

</html>
